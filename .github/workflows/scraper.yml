name: Sportradar Scraper

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 min (GitHub minimum)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps & Playwright
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Loop every 10s for 4.5 minutes
        id: scrape_loop
        run: |
          FILE_CHANGED=false
          END=$(( $(date +%s) + 270 ))   # 4.5 * 60 = 270 sec

          while [ $(date +%s) -lt $END ]; do
            echo "--- $(date '+%H:%M:%S') ---"
            node scraper.js
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 2 ]; then
              echo "File updated!"
              FILE_CHANGED=true
            fi

            REMAINING=$(( END - $(date +%s) ))
            if [ $REMAINING -gt 10 ]; then
              sleep 10
            else
              break
            fi
          done

          echo "file_changed=$FILE_CHANGED" >> $GITHUB_OUTPUT

      - name: Commit & push if changed
        if: steps.scrape_loop.outputs.file_changed == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add utolsomerkozesek.json
          git diff --staged --quiet || git commit -m "chore: update utolsomerkozesek.json [$(date '+%Y-%m-%d %H:%M:%S UTC')]"
          git push
          echo "Pushed!"
