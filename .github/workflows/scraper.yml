name: Sportradar Scraper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps & Playwright
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Scrape loop (every 10s, 4.5 min total)
        id: loop
        run: |
          FILE_CHANGED=false
          END=$(( $(date +%s) + 270 ))

          while [ $(date +%s) -lt $END ]; do
            echo "--- $(date '+%H:%M:%S') ---"
            node scraper.js
            CODE=$?

            if [ $CODE -eq 2 ]; then
              FILE_CHANGED=true
              echo "  >> File updated!"
            fi

            REMAINING=$(( END - $(date +%s) ))
            [ $REMAINING -gt 10 ] && sleep 10 || break
          done

          echo "file_changed=$FILE_CHANGED" >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.loop.outputs.file_changed == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add utolsomerkozesek.json
          git diff --staged --quiet || git commit -m "update: utolsomerkozesek.json [$(date '+%Y-%m-%d %H:%M UTC')]"
          git push
